<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SEErch</title>
  <link rel="stylesheet" href="static/style.css"/>
</head>
<body>

  <div class="container">
    <h1 class="logo">SEErch</h1>
    <p class="tagline">Be yourself.</p>

    <div class="search-box">
      <input id="query" type="text" placeholder="Search anything..." />
      <button onclick="search()">Go</button>
    </div>

    <div class="modes">
      <h3>Choose Mode</h3>
      <label><input type="radio" name="mode" value="casual" checked> Casual</label>
      <label><input type="radio" name="mode" value="learner"> Learner</label>
      <label><input type="radio" name="mode" value="social"> Social</label>
      <label><input type="radio" name="mode" value="family"> Family</label>
      <label class="raw"><input type="radio" name="mode" value="raw"> RAW (Use at your own risk)</label>
    </div>

    <div id="results"></div>

    <footer class="footer">
      © 2026 darky-github
    </footer>
  </div>

  <script src="static/app.js"></script>
</body>
</html>
