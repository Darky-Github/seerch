<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SEErch</title>
  <link rel="stylesheet" href="static/style.css"/>
</head>
<body>

  <div class="container">

    <div class="top-bar">
      <h1 class="logo">SEErch</h1>
      <button class="theme-toggle" onclick="toggleTheme()">Theme</button>
    </div>

    <p class="tagline">Be yourself.</p>

    <div class="search-section">
      <input id="query" type="text" placeholder="Search the web..." />
      <button onclick="search()">Search</button>
    </div>

    <div class="modes">
      <label><input type="radio" name="mode" value="casual" checked> Casual</label>
      <label><input type="radio" name="mode" value="learner"> Learner</label>
      <label><input type="radio" name="mode" value="social"> Social</label>
      <label><input type="radio" name="mode" value="family"> Family</label>
    </div>

    <div id="info"></div>
    <div id="results"></div>

    <div id="pagination"></div>

    <footer>
      © 2026 SEErch
    </footer>
  </div>

  <script src="static/app.js"></script>
</body>
</html>
